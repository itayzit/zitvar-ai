<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1C1917"/>
  <!-- Root node: amber pill -->
  <rect x="9" y="3" width="14" height="8" rx="3" fill="#F59E0B"/>
  <!-- Trunk -->
  <line x1="16" y1="11" x2="16" y2="15" stroke="#78716C" stroke-width="1.5"/>
  <!-- Horizontal bar -->
  <line x1="8" y1="15" x2="24" y2="15" stroke="#78716C" stroke-width="1.5"/>
  <!-- Left drop -->
  <line x1="8" y1="15" x2="8" y2="18" stroke="#78716C" stroke-width="1.5"/>
  <!-- Right drop -->
  <line x1="24" y1="15" x2="24" y2="18" stroke="#78716C" stroke-width="1.5"/>
  <!-- Left node: green pill -->
  <rect x="2" y="18" width="12" height="7" rx="2.5" fill="#10B981"/>
  <!-- Right node: green pill -->
  <rect x="18" y="18" width="12" height="7" rx="2.5" fill="#10B981"/>
  <!-- Leaf dots from left -->
  <line x1="6" y1="25" x2="6" y2="28" stroke="#78716C" stroke-width="1.2"/>
  <line x1="10" y1="25" x2="10" y2="28" stroke="#78716C" stroke-width="1.2"/>
  <circle cx="6" cy="29.5" r="1.8" fill="#A78BFA"/>
  <circle cx="10" cy="29.5" r="1.8" fill="#A78BFA"/>
  <!-- Leaf dots from right -->
  <line x1="22" y1="25" x2="22" y2="28" stroke="#78716C" stroke-width="1.2"/>
  <line x1="26" y1="25" x2="26" y2="28" stroke="#78716C" stroke-width="1.2"/>
  <circle cx="22" cy="29.5" r="1.8" fill="#A78BFA"/>
  <circle cx="26" cy="29.5" r="1.8" fill="#A78BFA"/>
</svg>
